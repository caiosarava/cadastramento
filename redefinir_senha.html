<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMESOL - Redefinir Senha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
        }
        .card {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background-color: #48bb78;
            transition: background-color 0.3s;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #38a169;
        }
        .btn-primary:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="card bg-white p-8 md:p-10 rounded-xl w-full max-w-md">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-green-700">COMESOL</h1>
            <p class="text-gray-500 mt-1">Redefinir Senha</p>
        </header>

        <div id="statusMessage" class="hidden p-3 mb-4 rounded-lg text-sm text-center" role="alert"></div>

        <div id="resetForm">
            <form id="newPasswordForm" class="space-y-6">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Nova Senha</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="••••••••" minlength="6">
                    <p class="text-xs text-gray-500 mt-1">A senha deve ter pelo menos 6 caracteres</p>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Nova Senha</label>
                    <input type="password" id="confirmPassword" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="••••••••" minlength="6">
                </div>

                <button type="submit" id="submitButton" class="btn-primary w-full text-white font-semibold py-2.5 rounded-lg flex items-center justify-center shadow-md">
                    <span id="loadingSpinner" class="hidden mr-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span id="buttonText">Redefinir Senha</span>
                </button>
            </form>
        </div>

        <div id="successMessage" class="hidden text-center">
            <p class="text-gray-600 mb-4">Sua senha foi redefinida com sucesso!</p>
            <a href="login.html" class="btn-primary text-white font-semibold py-2.5 rounded-lg inline-block">
                Ir para Login
            </a>
        </div>

        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm text-green-600 hover:text-green-800 transition duration-150 font-medium">
                Voltar ao Login
            </a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.44.4/+esm';
        import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/supabase.js';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const elements = {
            form: document.getElementById('newPasswordForm'),
            password: document.getElementById('password'),
            confirmPassword: document.getElementById('confirmPassword'),
            button: document.getElementById('submitButton'),
            loadingSpinner: document.getElementById('loadingSpinner'),
            buttonText: document.getElementById('buttonText'),
            statusMessage: document.getElementById('statusMessage'),
            resetForm: document.getElementById('resetForm'),
            successMessage: document.getElementById('successMessage')
        };

        function displayStatus(message, className, duration = 0) {
            elements.statusMessage.textContent = message;
            elements.statusMessage.className = `p-3 mb-4 rounded-lg text-sm text-center ${className}`;
            elements.statusMessage.classList.remove('hidden');

            if (duration > 0) {
                setTimeout(() => {
                    elements.statusMessage.classList.add('hidden');
                }, duration);
            }
        }

        function setLoading(isLoading) {
            elements.button.disabled = isLoading;
            if (isLoading) {
                elements.buttonText.textContent = 'Redefinindo...';
                elements.loadingSpinner.classList.remove('hidden');
            } else {
                elements.buttonText.textContent = 'Redefinir Senha';
                elements.loadingSpinner.classList.add('hidden');
            }
        }

        async function handleResetPassword(e) {
            e.preventDefault();

            const password = elements.password.value;
            const confirmPassword = elements.confirmPassword.value;

            if (!password || !confirmPassword) {
                displayStatus('Preencha todos os campos.', 'bg-yellow-100 text-yellow-700', 3000);
                return;
            }

            if (password.length < 6) {
                displayStatus('A senha deve ter pelo menos 6 caracteres.', 'bg-yellow-100 text-yellow-700', 3000);
                return;
            }

            if (password !== confirmPassword) {
                displayStatus('As senhas não coincidem.', 'bg-yellow-100 text-yellow-700', 3000);
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabase.auth.updateUser({ password });

                if (error) throw error;

                elements.resetForm.classList.add('hidden');
                elements.successMessage.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } catch (error) {
                console.error('Erro ao redefinir senha:', error);

                let errorMessage = error.message;

                if (error.message.includes('invalid')) {
                    errorMessage = 'Link de recuperação inválido ou expirado. Solicite um novo link de recuperação.';
                } else if (error.message.includes('Password')) {
                    errorMessage = 'A senha não atende aos requisitos mínimos.';
                }

                displayStatus(`Erro: ${errorMessage}`, 'bg-red-100 text-red-700', 5000);
                setLoading(false);
            }
        }

        elements.form.addEventListener('submit', handleResetPassword);

        // Validação em tempo real das senhas
        elements.confirmPassword.addEventListener('input', function() {
            if (elements.password.value && elements.confirmPassword.value) {
                if (elements.password.value !== elements.confirmPassword.value) {
                    elements.confirmPassword.setCustomValidity('As senhas não coincidem');
                } else {
                    elements.confirmPassword.setCustomValidity('');
                }
            }
        });

        // Verifica se o usuário tem uma sessão de recuperação de senha
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await supabase.auth.getSession();

            if (!session || session.user?.recovery_sent_at === undefined) {
                // Sem sessão válida de recuperação, redireciona para recuperar_senha.html
                displayStatus('Link inválido ou expirado. Solicite um novo link de recuperação.', 'bg-red-100 text-red-700');
                setTimeout(() => {
                    window.location.href = 'recuperar_senha.html';
                }, 3000);
            }
        });
    </script>
</body>
</html>

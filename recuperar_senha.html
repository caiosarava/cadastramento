<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMESOL - Recuperar Senha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
        }
        .card {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background-color: #48bb78;
            transition: background-color 0.3s;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #38a169;
        }
        .btn-primary:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="card bg-white p-8 md:p-10 rounded-xl w-full max-w-md">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-green-700">COMESOL</h1>
            <p class="text-gray-500 mt-1">Recuperar Senha</p>
        </header>

        <div id="statusMessage" class="hidden p-3 mb-4 rounded-lg text-sm text-center" role="alert"></div>

        <div id="recoveryForm">
            <p class="text-gray-600 text-sm mb-6">
                Digite seu email de cadastro e enviaremos um link para recuperação de senha.
            </p>

            <form id="resetForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500" placeholder="seu.email@exemplo.com">
                </div>

                <button type="submit" id="sendButton" class="btn-primary w-full text-white font-semibold py-2.5 rounded-lg flex items-center justify-center shadow-md">
                    <span id="loadingSpinner" class="hidden mr-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span id="buttonText">Enviar Link de Recuperação</span>
                </button>
            </form>
        </div>

        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm text-green-600 hover:text-green-800 transition duration-150 font-medium">
                Voltar ao Login
            </a>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.44.4/+esm';

        const SUPABASE_URL = 'https://egarccprmvgqsvivnerc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnYXJjY3BybXZncXN2aXZuZXJjIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1OTE2NTQ1OSwiZXhwIjoyMDc0NzQxNDU5fQ.CIZo0X0ua2teiR4zfUJnSA1WfOP_HFzDZPA0dBjsGtY';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const elements = {
            form: document.getElementById('resetForm'),
            email: document.getElementById('email'),
            button: document.getElementById('sendButton'),
            loadingSpinner: document.getElementById('loadingSpinner'),
            buttonText: document.getElementById('buttonText'),
            statusMessage: document.getElementById('statusMessage'),
            recoveryForm: document.getElementById('recoveryForm')
        };

        function displayStatus(message, className, duration = 0) {
            elements.statusMessage.textContent = message;
            elements.statusMessage.className = `p-3 mb-4 rounded-lg text-sm text-center ${className}`;
            elements.statusMessage.classList.remove('hidden');

            if (duration > 0) {
                setTimeout(() => {
                    elements.statusMessage.classList.add('hidden');
                }, duration);
            }
        }

        function setLoading(isLoading) {
            elements.button.disabled = isLoading;
            if (isLoading) {
                elements.buttonText.textContent = 'Enviando...';
                elements.loadingSpinner.classList.remove('hidden');
            } else {
                elements.buttonText.textContent = 'Enviar Link de Recuperação';
                elements.loadingSpinner.classList.add('hidden');
            }
        }

        async function handleReset(e) {
            e.preventDefault();

            const email = elements.email.value.trim();

            if (!email) {
                displayStatus('Digite seu email para continuar.', 'bg-yellow-100 text-yellow-700', 3000);
                return;
            }

            setLoading(true);

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/redefinir_senha.html'
                });

                if (error) throw error;

                displayStatus('✅ Link de recuperação enviado! Verifique seu email (inclusive a pasta de spam).', 'bg-green-100 text-green-700');
                elements.form.reset();

                // Redireciona para login após 3 segundos
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 4000);
            } catch (error) {
                console.error('Erro ao solicitar reset de senha:', error);

                let errorMessage = error.message;

                if (error.message.includes('not found')) {
                    errorMessage = 'Email não encontrado no sistema.';
                } else if (error.message.includes('Invalid')) {
                    errorMessage = 'Email inválido.';
                }

                displayStatus(`Erro: ${errorMessage}`, 'bg-red-100 text-red-700', 5000);
                setLoading(false);
            }
        }

        elements.form.addEventListener('submit', handleReset);

        // Verifica se já está autenticado ao carregar a página
        window.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                // Se já está autenticado, redireciona para login
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
